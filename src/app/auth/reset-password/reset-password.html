<!DOCTYPE html>

<html lang="en">

<head>
          <meta charset="utf-8" />
          <meta content="width=device-width, initial-scale=1.0" name="viewport" />
          <title>Reset your password | Go Auth Platform</title>
          <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
                    rel="stylesheet" />
          <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                    rel="stylesheet" />
          <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                    rel="stylesheet" />
          <style>
                    body {
                              font-family: 'Inter', sans-serif;
                    }

                    .go-gradient {
                              background: linear-gradient(135deg, #00abd6 0%, #007d9c 100%);
                    }
          </style>
          
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
          <div class="flex min-h-screen flex-col lg:flex-row">
                    <div class="hidden lg:flex lg:w-1/2 go-gradient relative items-center justify-center p-12">
                              <div class="absolute inset-0 opacity-10"
                                        data-alt="Subtle geometric cube pattern for developer aesthetic"
                                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBV0UbimSLaKIqgZwmfIET0WNwfxRO_R9NO_FxYtRceVdN0SfZcILWx4JcFglyBwFyTBaQEj9MFzlYuMeMZdlOXl6F7AFhQNP1paMIvFsAVAt3jxuACZl7yWavEnVYtVn1TfYdV9pL8DgA09afH8FBaHLrcvW4e1tAbkpG1U52My5Xfmo5Gy8cVJb3AtWyDakhsaMt82EjuW70Z1DkpattLTzTvIBeJdeEJJ2Yx0m2kfeifkIUdJFg6Q-786BWrOanq8ekHvUCmtDaW');">
                              </div>
                              <div class="relative z-10 text-white max-w-md text-center">
                                        <div class="mb-8 flex justify-center">
                                                  <div
                                                            class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                                                            <img src="/img/logo.png" alt="Logo Go Platform">
                                                  </div>
                                        </div>
                                        <h1 class="text-4xl font-bold mb-4">GoPlatform</h1>
                                        
                                          
                              </div>
                    </div>
                    <div class="flex w-full items-center justify-center p-8 lg:w-1/2 lg:p-16">
                              <div class="w-full max-w-[480px]">
                                        <div class="mb-10">
                                                  <h2
                                                            class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
                                                            Reset your password</h2>
                                                  <p class="mt-3 text-slate-600 dark:text-slate-400">
                                                            Enter the email address associated with your account and
                                                            we'll send you a link to reset your password.
                                                  </p>
                                        </div>
                                        <form class="space-y-6">
                                                  <div>
                                                            <label class="block text-sm font-semibold leading-6 text-slate-900 dark:text-slate-100"
                                                                      for="email">Email Address</label>
                                                            <div class="mt-2 relative">
                                                                      <div
                                                                                class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                                                                                <span
                                                                                          class="material-symbols-outlined text-slate-400">mail</span>
                                                                      </div>
                                                                      <input class="block w-full rounded-lg border-0 py-4 pl-12 pr-4 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-primary dark:bg-slate-800 dark:text-white dark:ring-slate-700 sm:text-sm sm:leading-6"
                                                                                id="email" name="email"
                                                                                placeholder="name@company.com"
                                                                                required="" type="email" />
                                                            </div>
                                                  </div>
                                                  <button class="flex w-full justify-center rounded-lg bg-primary px-4 py-4 text-sm font-bold leading-6 text-white shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors"
                                                            type="submit">
                                                            Send Reset Link
                                                  </button>
                                        </form>
                                        <div class="mt-8 flex flex-col items-center gap-6">
                                                  <a class="group flex items-center gap-2 text-sm font-semibold text-primary"
                                                            href="#">
                                                           
                                                            Back to Login
                                                  </a>
                                                  
                                                  
                                        </div>
                              </div>
                    </div>
          </div>
</body>

</html>

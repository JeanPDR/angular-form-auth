<!DOCTYPE html>

<html lang="en">

<head>
          <meta charset="utf-8" />
          <meta content="width=device-width, initial-scale=1.0" name="viewport" />
          <title>Set new password | Go Auth Platform</title>
          <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
                    rel="stylesheet" />
          <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
                    rel="stylesheet" />
          <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                    rel="stylesheet" />
         
          <style>
                    body {
                              font-family: 'Inter', sans-serif;
                    }

                    .material-symbols-outlined {
                              font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
                    }
          </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
           <header
                                        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 md:px-40 bg-white dark:bg-background-dark">
                                        <div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
                                                  <div
                                                            class="flex items-center justify-center size-8 bg-primary/10 rounded-lg">
                                                            <img src="/img/logo.png" alt="Logo Go Platform">
                                                  </div>
                                                  <h2
                                                            class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">
                                                            Go Platform</h2>
                                        </div>
                                        <button
                                                  class="flex items-center justify-center overflow-hidden rounded-lg h-10 bg-primary/10 text-primary gap-2 text-sm font-bold px-4 hover:bg-primary/20 transition-colors">
                                                  <img class="flex items-center justify-center size-8 rounded-lg" src="/img/github-logo.png" alt="Icone Github">
                                        </button>
                              </header>
          <main class="flex-1 flex items-center justify-center p-6">
                    <div
                              class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-primary/10 overflow-hidden">
                              <div class="p-8">
                                        <div class="mb-8 text-center">
                                                  <div
                                                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 text-primary mb-4">
                                                            <img src="/img/logo.png" alt="Logo Go Platform">
                                                  </div>
                                                  <h1
                                                            class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">
                                                            Set New Password</h1>
                                                  <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Create a
                                                            strong password to protect your account and regain access.
                                                  </p>
                                        </div>
                                        <div class="space-y-6">
                                                  <div class="flex flex-col gap-2">
                                                            <label
                                                                      class="text-slate-700 dark:text-slate-300 text-sm font-semibold">New
                                                                      Password</label>
                                                            <div class="relative group">
                                                                      <input class="w-full h-14 bg-background-light dark:bg-slate-800 border border-primary/20 dark:border-slate-700 rounded-lg px-4 pr-12 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                                                                                placeholder="Enter new password"
                                                                                type="password" />
                                                                      <button
                                                                                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                                                                <span
                                                                                          class="material-symbols-outlined">visibility</span>
                                                                      </button>
                                                            </div>
                                                         
                                                            
                                                  </div>
                                                  <div class="flex flex-col gap-2">
                                                            <label
                                                                      class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Confirm
                                                                      New Password</label>
                                                            <div class="relative group">
                                                                      <input class="w-full h-14 bg-background-light dark:bg-slate-800 border border-primary/20 dark:border-slate-700 rounded-lg px-4 pr-12 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                                                                                placeholder="Repeat new password"
                                                                                type="password" />
                                                                      <button
                                                                                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                                                                <span
                                                                                          class="material-symbols-outlined">visibility</span>
                                                                      </button>
                                                            </div>
                                                  </div>
                                                 
                                                  <div class="pt-4">
                                                            <button
                                                                      class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold text-base shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                                                                      <span>Reset Password</span>
                                                                      
                                                            </button>
                                                  </div>
                                        </div>
                              </div>
                    </div>
          </main>
          <!-- Footer Space -->
          <footer class="py-6 text-center text-slate-400 text-xs">
                    © 2024 Go Platform. All rights reserved.
          </footer>
</body>

</html>
